name: NPU Simulation Pipeline

on:
  repository_dispatch:
    types: [new_model_ready]
  workflow_dispatch:
    inputs:
      commit:
        description: 'Source repo commit SHA (수동 테스트용)'
        required: true
      model_path:
        description: '모델 경로 (절대경로 / s3:// / https://)'
        required: true
      source_repo:
        description: 'Source repo (예: Kwon-GiHwan/model_compression)'
        required: true

concurrency:
  group: sim-${{ github.event.client_payload.commit || github.event.inputs.commit }}
  cancel-in-progress: false

jobs:
  simulate:
    runs-on: [self-hosted, linux, npu-server]
    timeout-minutes: 120
    env:
      COMMIT_SHA: ${{ github.event.client_payload.commit || github.event.inputs.commit }}
      MODEL_SRC:  ${{ github.event.client_payload.model_path || github.event.inputs.model_path }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo }}
      CONFIG_FILE: /home/gihwan/.npu-sim.env

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load server config
        run: |
          set -e
          if [[ ! -r "$CONFIG_FILE" ]]; then
            echo "ERROR: config file not found or unreadable: $CONFIG_FILE" >&2
            echo "서버에 ${CONFIG_FILE} 파일을 chmod 600 으로 작성해야 합니다." >&2
            echo "내용 예시는 .env.example 참조." >&2
            exit 1
          fi
          mode="$(stat -c '%a' "$CONFIG_FILE")"
          case "$mode" in
            600|400) ;;
            *)
              echo "ERROR: $CONFIG_FILE permissions must be 600 (or 400), got $mode" >&2
              exit 1
              ;;
          esac
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" =~ ^[[:space:]]*# ]] && continue
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            value="${value%\"}"; value="${value#\"}"
            value="${value%\'}"; value="${value#\'}"
            echo "${key}=${value}" >> "$GITHUB_ENV"
            if [[ "$key" =~ TOKEN|SECRET|PASSWORD|APIKEY|API_KEY ]]; then
              echo "::add-mask::${value}"
            fi
          done < "$CONFIG_FILE"

      - name: Sanity check
        run: |
          set -e
          : "${IMAGE:?IMAGE not loaded}"
          : "${SIM_WORK_DIR:?SIM_WORK_DIR not loaded}"
          : "${SOURCE_REPO_COMMENT_TOKEN:?SOURCE_REPO_COMMENT_TOKEN not loaded}"
          : "${COMMIT_SHA:?COMMIT_SHA not provided}"
          : "${MODEL_SRC:?MODEL_SRC not provided}"
          docker --version
          mkdir -p "$SIM_WORK_DIR"

      - name: Run NPU simulation
        id: sim
        run: bash scripts/run_sim.sh "$MODEL_SRC" "$COMMIT_SHA"

      - name: Read sim result
        id: read_result
        if: success()
        run: |
          set -e
          RESULT_FILE="${SIM_WORK_DIR}/${COMMIT_SHA}/result.json"
          if [[ ! -f "$RESULT_FILE" ]]; then
            echo "ERROR: result.json not found at $RESULT_FILE" >&2
            exit 1
          fi
          # GITHUB_OUTPUT에 파일 경로 export — 후속 step이 jq로 직접 파싱
          echo "result_file=$RESULT_FILE" >> $GITHUB_OUTPUT

      - name: Report back to source repo
        if: success()
        env:
          RESULT_FILE: ${{ steps.read_result.outputs.result_file }}
        run: |
          set -e
          # result.json에서 metric 추출
          CYCLES=$(jq -r '.total_cycles // "N/A"' "$RESULT_FILE")
          INFER_MS=$(jq -r '.inference_time_ms // "N/A"' "$RESULT_FILE")
          SRAM=$(jq -r '.sram_used_kb // "N/A"' "$RESULT_FILE")
          FLASH=$(jq -r '.flash_used_kb // "N/A"' "$RESULT_FILE")

          # PR 번호 역조회
          PR_LOOKUP=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SOURCE_REPO_COMMENT_TOKEN}" \
            "https://api.github.com/repos/${SOURCE_REPO}/commits/${COMMIT_SHA}/pulls" || echo "[]")
          PR_NUMBER=$(echo "$PR_LOOKUP" | jq -r '.[0].number // empty')

          # Markdown 댓글 본문
          BODY=$(cat <<EOF
          #### 🚀 NPU Simulation Result

          | Metric | Value |
          |--------|-------|
          | Total Cycles | \`${CYCLES}\` |
          | Inference Time | \`${INFER_MS} ms\` |
          | SRAM Used | \`${SRAM} KB\` |
          | Flash Used | \`${FLASH} KB\` |

          - **Target Commit**: \`${COMMIT_SHA}\`
          - **Source**: \`${SOURCE_REPO}\`
          - **Status**: ✅ Simulation Completed
          EOF
          )

          # JSON-safe 변환
          PAYLOAD=$(jq -n --arg body "$BODY" '{body:$body}')

          if [[ -n "$PR_NUMBER" ]]; then
            echo "Posting to PR #${PR_NUMBER}"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${SOURCE_REPO_COMMENT_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${SOURCE_REPO}/issues/${PR_NUMBER}/comments" \
              -d "$PAYLOAD"
          else
            echo "No PR found for commit, posting commit comment"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${SOURCE_REPO_COMMENT_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${SOURCE_REPO}/commits/${COMMIT_SHA}/comments" \
              -d "$PAYLOAD"
          fi

      - name: Upload sim artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-${{ env.COMMIT_SHA }}
          path: |
            ${{ env.SIM_WORK_DIR }}/${{ env.COMMIT_SHA }}/result.json
            ${{ env.SIM_WORK_DIR }}/${{ env.COMMIT_SHA }}/sim_result.log
          if-no-files-found: warn
          retention-days: 14
